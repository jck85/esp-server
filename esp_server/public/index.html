<!DOCTYPE HTML>
<html>

<head>
    <title>ESP Web Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <style>
        *,
        *:before,
        *:after {
            box-sizing: border-box;
        }

        /* Set defaults for common html tags */
        body {
            font-family: monospace;
            font-size: 100%;
            border: 4px solid black;
            width: 40rem;
            height: 30rem;
            margin: auto;
            padding: 1rem;
            overflow-y: scroll;
            color: black;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            margin: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            border: none;
            background: none;
            font-family: monospace;
        }

        a:hover,
        button:hover,
        input:hover,
        label:hover {
            cursor: pointer;
        }

        button:active {
            background-color: green;
            transform: scale(0.95);
        }

        /* App Styling*/
        .app {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        /* App Menu */
        nav {
            border: 2px solid black;
            background-color: darkgrey;
            display: flex;
            padding-left: 2rem;
        }

        /* Esp Gui */
        .esp-gui {
            border: 2px solid black;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* GUI Elements */
        .ws-button>button {
            border: 2px solid black;
            /* background-color: darkgrey; */
            width: 6rem;
            height: 2rem;
        }

        /* .button {
            border: 2px solid black;
            background-color: darkgrey;
            width: 2rem;
            height: 2rem;
        } */

        .button>button {
            border: 2px solid black;
            /* background-color: darkgrey; */
            width: 2rem;
            height: 2rem;
            /* width: 100%;
            height: 100%; */
        }

        /* tests */
        .switch {
            border: 2px solid black;
            background-color: darkgrey;
            width: 3rem;
            height: 2rem;
            position: relative;
            display: inline-block;
        }

        .switch>label {
            position: absolute;
            margin: auto;
            padding-left: 25%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .switch>input {
            display: none;
            position: absolute;
            left: 2rem;
        }

        .switch>span {
            position: absolute;
            left: -1.5px;
            top: -1.5px;
            border: 2px solid black;
            background-color: grey;
            width: calc(50% + 3px);
            height: calc(100% + 3px);
            -webkit-transition: .3s;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch:has(input[type="checkbox"]:checked) {
            background-color: green;
        }

        .switch-input:checked+span {
            transform: translateX(calc(75% + 3px));
            -webkit-transform: translateX(calc(75% + 3px));
            -ms-transform: translateX(calc(75% + 3px));
        }
    </style>
</head>

<body>

    <main class="app">
        <nav>
            <h2>ESP Web Server</h2>
        </nav>

        <div id="esp-ws-gui" class="esp-gui">
            <p>STATUS: <span id="ws-status">OFF</span></p>
            <div class="ws-button">
                <button id="ws-send" onclick="ws_send(this)">Toggle</button>
            </div>
        </div>

        </div>

        <div id="esp-gui" class="esp-gui">
            <div class="button">
                <button id="button-4" onclick="button_pressed(this)">4</button>
            </div>

            <div class="button">
                <button id="button-5" onclick="button_pressed(this)">5</button>
            </div>

            <div class="switch">
                <label for="switch-4" class="switch-label"></label>
                <input id="switch-4" class="switch-input" type="checkbox" onchange="switch_toggle(this)">
                <span class="slider">4</span>
            </div>

            <div class="switch">
                <label for="switch-5" class="switch-label"></label>
                <input id="switch-5" class="switch-input" type="checkbox" onchange="switch_toggle(this)">
                <span class="slider">5</span>
            </div>
        </div>
    </main>

    <script>

        // params should be an object whose key value pairs
        // will become the key value pairs of the query string
        function esp_request(endpoint, params = []) {

            var xhr = new XMLHttpRequest();

            let url_string = "/" + endpoint;

            // check if there are params to add
            let keys = Object.keys(params);

            if (keys.length !== 0) {
                url_string += "?";
                for (let i = 0; i < keys.length; i++) {
                    let key = keys[i];
                    let value = params[key];

                    url_string += key + "=" + value;

                    if (i !== keys.length - 1) {
                        url_string += "&";
                    }
                }
            }

            xhr.open("GET", url_string, true);

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const res = xhr.responseText;
                    const data = JSON.parse(res);
                    console.log("response: ", res);
                } else {
                    console.log("request failed");
                }
            }

            xhr.send();
        }

        function button_pressed(element) {
            let params = {
                "id": element.id,
                "gpio": element.id.split("-")[1],
                "state": "pressed"
            };

            esp_request("update", params);
        }

        function switch_toggle(element) {

            var xhr = new XMLHttpRequest();

            let state = element.checked ? "1" : "0";

            let url_string = "/update?gpio=" + element.id + "&state=" + state;

            let params = {
                "id": element.id,
                "gpio": element.id.split("-")[1],
                "state": state
            };

            esp_request("update", params);
        }

        // Web Sockets
        const ws_gateway = `ws://192.168.1.169:8080/ws`;
        let ws;

        function ws_init() {
            console.log("Initializing Web Socket")
            ws = new WebSocket(ws_gateway)
            ws.onopen = wsOnOpen;
            ws.onclose = wsOnClose;
            ws.onmessage = wsOnMessage;
        }

        function wsOnOpen() {
            console.log("Web Socket Connection Open")
        }

        function wsOnClose() {
            console.log("Web Socket Connection Closed")
        }

        function wsOnMessage(event) {
            console.log("ws event: ", event.data);
            let state = "NIL";
            if (event.data == "1") {
                state = "ON";
            }
            else {
                state = "OFF";
            }
            document.getElementById('ws-status').innerHTML = state;
        }

        function ws_send() {
            ws.send("toggle");
        }

        window.onload = (event) => {
            ws_init();
        };


    </script>
</body>

</html>
