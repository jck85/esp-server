<!DOCTYPE HTML>
<html>

<head>
    <title>ESP Web Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0;
            background-color: white;
            font-family: monospace;
            padding-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            margin: 0;
        }

        nav {
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-title {
            font-size: 1.4rem;
        }

        .gpio-gui {
            border: 4px solid black;
            width: 30rem;
            height: 10rem;
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }

        /* GUI ELEMENTS */
        .switch {
            border: 4px solid black;
            width: 5rem;
            height: 3rem;
            background-color: darkgrey;
        }

        .switch-label {
            /* border: 4px solid black; */
            /* border-radius: 15%; */
            width: 100%;
            height: 100%;
            position: relative;
            display: inline-block;
        }

        .switch-label input {
            /* border: 4px solid black; */
            display: none;
        }

        /* .slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: white;
            border-radius: 15%;
        } */

        .slider {
            position: absolute;
            content: "";
            width: 50%;
            height: 100%;
            background-color: blue;
            -webkit-transition: .4s;
            transition: .4s;
        }

        /* .switch-input:checked + .switch {
            background-color: green;
        } */

        .switch:has(input[type="checkbox"]:checked) {
            background-color: green;
            /* Background color when checkbox is checked */
        }

        .switch-input:checked+.slider {
            -webkit-transform: translateX(2.5rem);
            -ms-transform: translateX(2.5rem);
            transform: translateX(2.5rem)
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-title">
            <h2>ESP Web Server</h2>
        </div>
    </nav>

    <!-- %BUTTON_TEMPALTE% -->
    <main>
        <div id="gpio-gui" class="gpio-gui">
            <div class="switch">
                <label class="switch-label">
                    <input id="4" class="switch-input" type="checkbox" onchange="toggleCheckbox(this)">
                    <span class="slider"></span>
                </label>
                <p>GPIO 4</p>
            </div>
            <div class="switch">
                <label class="switch-label">
                    <input id="5" class="switch-input" type="checkbox" onchange="toggleCheckbox(this)">
                    <span class="slider"></span>
                </label>
                <p>GPIO 5</p>
            </div>
            <div class="switch">
                <label class="switch-label">
                    <input id="6" class="switch-input" type="checkbox" onchange="toggleCheckbox(this)">
                    <span class="slider"></span>
                </label>
                <p>GPIO 6</p>
            </div>
        </div>

    </main>
    <script>
        function toggleCheckbox(element) {
            console.log("checkbox: ", element.id, element.checked);

            var xhr = new XMLHttpRequest();

            let state = element.checked ? "1" : "0";

            xhr.open("GET", "/update?gpio=" + element.id + "&state=" + state, true);

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const res = xhr.responseText;
                    const data = JSON.parse(res);
                    console.log("response: ", res);
                } else {
                    console.log("request failed");
                }
            }

            xhr.send();

        }
    </script>
</body>

</html>
