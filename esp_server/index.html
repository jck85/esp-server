    <style>
        *,
        *:before,
        *:after {
            box-sizing: border-box;
        }

        /* Set defaults for common html tags */
        body {
            font-family: monospace;
            font-size: 100%;
            border: 4px solid black;
            width: 40rem;
            height: 30rem;
            margin: auto;
            padding: 1rem;
            overflow-y: scroll;

        h1,

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            border: none;
            background: none;
            font-family: monospace;
        }

        a:hover,
        button:hover,
        input:hover,
        label:hover {
            cursor: pointer;
        }

        /* App Styling*/
        .app {
            display: flex;
            flex-direction: column;

        /* App Menu */
        nav {
            border: 2px solid black;
            background-color: darkgrey;
            display: flex;
        }

        /* Esp Gui */
        .esp-gui {
            border: 2px solid black;
            /* width: 30rem; */
            /* height: 10rem; */
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }

        /* GUI Elements */

        /* Button Component */
        .button {
            border: 2px solid black;
            background-color: darkgrey;
            width: 2rem;
            height: 2rem;
        }

        .button>button {
            width: 100%;
            height: 100%;
        }

        .button:has(button:active) {
            background-color: green;
            transform: scale(0.95);
        }

        /* Switch Component */
        /* .switch {

        /* tests */
        .switch {
            border: 2px solid black;
            background-color: darkgrey;
            width: 3rem;
            height: 2rem;
            position: relative;
            display: inline-block;
        }

        /* .switch>label {
            width: 100%;
            height: 100%;
        } */

        .switch>label {
            position: absolute;
            margin: auto;
            padding-left: 25%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            /* justify-content: center; */
            z-index: 1;
        }

        .switch>input {
            display: none;
            position: absolute;
            left: 2rem;
        }

        .switch>span {
            position: absolute;
            left: -1.5px;
            top: -1.5px;
            border: 2px solid black;
            background-color: grey;
            /* content: ""; */
            /* width: 50%; */
            /* height: 100%; */
            width: calc(50% + 3px);
            height: calc(100% + 3px);
            -webkit-transition: .3s;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch:has(input[type="checkbox"]:checked) {
            background-color: green;
        }

        .switch-input:checked+span {
            /* -webkit-transform: translateX(calc(90% + 3px)); */
            /* -ms-transform: translateX(calc(100% + 3px)); */
            transform: translateX(calc(75% + 3px))
        }
    </style>

<body>

    <main class="app">
        <nav>
            <h2>ESP Web Server</h2>

        <div id="esp-gui" class="esp-gui">

            <div class="button">
                <button id="gpio-4" onclick="button_test(this)">4</button>
            </div>

            <div class="switch">

                <input id="4" class="switch-input" type="checkbox" onchange="toggleCheckbox(this)">
                <span class="slider">4</span>
            </div>

    <script>
        function button_test(element) {
            console.log(element.id)
        }

        function toggleCheckbox(element) {
            console.log("checkbox: ", element.id, element.checked);

            var xhr = new XMLHttpRequest();

            let state = element.checked ? "1" : "0";

            xhr.open("GET", "/update?gpio=" + element.id + "&state=" + state, true);

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const res = xhr.responseText;
                    const data = JSON.parse(res);
                    console.log("response: ", res);
                } else {
                    console.log("request failed");
                }
            }

            xhr.send();
        }
    </script>
